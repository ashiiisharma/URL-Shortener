##docker compose

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres_db
    environment:
      POSTGRES_DB: url_shortener_db
      POSTGRES_USER: url_shortener_usr
      POSTGRES_PASSWORD: url_shortener_pw01
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7.2-alpine
    container_name: redis_cache
    ports:
      - "6379:6379"

volumes:
  postgres_data: